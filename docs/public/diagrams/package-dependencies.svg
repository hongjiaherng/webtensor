<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="821px" preserveAspectRatio="none" style="width:1001px;height:821px;background:#FAFAFA;" version="1.1" viewBox="0 0 1001 821" width="1001px" zoomAndPan="magnify"><title>Webtensor &#8212; Package Dependency Layers</title><defs/><g><rect fill="#FAFAFA" height="821" style="stroke:none;stroke-width:1;" width="1001" x="0" y="0"/><text fill="#000000" font-family="Segoe UI" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="279.125" x="354.2444" y="25.1074">Webtensor &#8212; Package Dependency Layers</text><!--entity ir--><g class="entity" data-entity="ir" data-source-line="9" data-uid="ent0002" id="entity_ir"><rect fill="#FFF8EE" height="57.2422" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="175.0459" x="92" y="46.6211"/><text fill="#000000" font-family="Segoe UI" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="9.5498" x="102" y="71.7285">ir</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="155.0459" x="102" y="90.3496">pure types &#8212; no runtime</text></g><!--entity runtime--><g class="entity" data-entity="runtime" data-source-line="11" data-uid="ent0003" id="entity_runtime"><rect fill="#EEFFF0" height="75.8633" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="181.2256" x="402" y="164.6211"/><text fill="#000000" font-family="Segoe UI" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="52.3359" x="412" y="189.7285">runtime</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="161.2256" x="412" y="208.3496">Engine, Backend interface,</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="125.1523" x="412" y="226.9707">view ops, dtype utils</text></g><!--entity core--><g class="entity" data-entity="core" data-source-line="13" data-uid="ent0004" id="entity_core"><rect fill="#EEF4FF" height="94.4844" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="161.4355" x="7" y="346.6211"/><text fill="#000000" font-family="Segoe UI" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="28.4238" x="17" y="371.7285">core</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="81.4775" x="17" y="390.3496">tensor library</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="141.4355" x="17" y="408.9707">(Tensor, ops, autograd,</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="113.3877" x="17" y="427.5918">compile/grad/run)</text></g><!--entity nn--><g class="entity" data-entity="nn" data-source-line="15" data-uid="ent0005" id="entity_nn"><rect fill="#F5EEFF" height="75.8633" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="216.2666" x="202.5" y="584.6211"/><text fill="#000000" font-family="Segoe UI" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="16.9395" x="212.5" y="609.7285">nn</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="180.708" x="212.5" y="628.3496">activations, losses, optimizers</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="196.2666" x="212.5" y="646.9707">(relu, softmax, mseLoss, SGD, ...)</text></g><!--entity cpu--><g class="entity" data-entity="cpu" data-source-line="17" data-uid="ent0006" id="entity_cpu"><rect fill="#FFF0F0" height="57.2422" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="132.3555" x="469.5" y="497.6211"/><text fill="#000000" font-family="Segoe UI" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="85.0049" x="479.5" y="522.7285">backend-cpu</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="112.3555" x="479.5" y="541.3496">TypeScript kernels</text></g><!--entity wasm--><g class="entity" data-entity="wasm" data-source-line="18" data-uid="ent0007" id="entity_wasm"><rect fill="#FFF0F0" height="57.2422" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="163.9854" x="606.5" y="497.6211"/><text fill="#000000" font-family="Segoe UI" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="98.8135" x="616.5" y="522.7285">backend-wasm</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="143.9854" x="616.5" y="541.3496">Rust via wasm-bindgen</text></g><!--entity webgpu--><g class="entity" data-entity="webgpu" data-source-line="19" data-uid="ent0008" id="entity_webgpu"><rect fill="#FFF0F0" height="57.2422" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="166.6855" x="812" y="594.1211"/><text fill="#000000" font-family="Segoe UI" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="114.3721" x="822" y="619.2285">backend-webgpu</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="146.6855" x="822" y="637.8496">WGSL compute shaders</text></g><!--entity user--><g class="entity" data-entity="user" data-source-line="21" data-uid="ent0009" id="entity_user"><rect fill="#F5F5F5" height="75.8633" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="141.9668" x="417.5" y="739.6211"/><text fill="#000000" font-family="Segoe UI" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="63.1572" x="427.5" y="764.7285">user code</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="68.4004" x="427.5" y="783.3496">core + (nn)</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="121.9668" x="427.5" y="801.9707">+ a backend import</text></g><g class="entity" data-entity="GMN23" data-source-line="40" data-uid="ent0024" id="entity_GMN23"><path d="M203.5,323.6211 L203.5,389.6211 L168.08,393.6211 L203.5,397.6211 L203.5,463.9492 A4,4 0 0 0 207.5,467.9492 L399.3008,467.9492 A4,4 0 0 0 403.3008,463.9492 L403.3008,329.6211 L393.3008,319.6211 L207.5,319.6211 A4,4 0 0 0 203.5,323.6211" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M393.3008,319.6211 L393.3008,327.6211 A2,2 0 0 0 395.3008,329.6211 L403.3008,329.6211 L393.3008,319.6211" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacing" textLength="178.8008" x="209.5" y="338.6494">core is unaware of backends &#8212;</text><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacing" textLength="176.7759" x="209.5" y="355.9404">the user picks one and imports</text><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacing" textLength="152.0898" x="209.5" y="373.2314">for the side-effect register.</text><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacing" textLength="3.561" x="209.5" y="390.5225">&#160;</text><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacing" textLength="125.1885" x="209.5" y="407.8135">nn sits on top of core,</text><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacing" textLength="121.0942" x="209.5" y="425.1045">mirroring tfjs-layers /</text><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacing" textLength="170.6758" x="209.5" y="442.3955">jax.nn + optax. Inference-only</text><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacing" textLength="116.1494" x="209.5" y="459.6865">users don't pull it in.</text></g><!--reverse link ir to runtime--><g class="link" data-entity-1="ir" data-entity-2="runtime" data-source-line="23" data-uid="lnk10" id="link_ir_runtime"><path d="M253.7591,105.8939 C298.9291,124.0039 352.96,145.6711 401