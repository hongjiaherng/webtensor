data-source-line="13" data-uid="ent0004" id="entity_core"><rect fill="#EEF4FF" height="94.4844" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="161.4355" x="7" y="346.6211"/><text fill="#000000" font-family="Segoe UI" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="28.4238" x="17" y="371.7285">core</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="81.4775" x="17" y="390.3496">tensor library</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="141.4355" x="17" y="408.9707">(Tensor, ops, autograd,</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="113.3877" x="17" y="427.5918">compile/grad/run)</text></g><!--entity nn--><g class="entity" data-entity="nn" data-source-line="15" data-uid="ent0005" id="entity_nn"><rect fill="#F5EEFF" height="75.8633" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="182.5381" x="80" y="584.6211"/><text fill="#000000" font-family="Segoe UI" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="16.9395" x="90" y="609.7285">nn</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="109.3613" x="90" y="628.3496">activations, losses</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="162.5381" x="90" y="646.9707">(relu, softmax, mseLoss, ...)</text></g><!--entity optim--><g class="entity" data-entity="optim" data-source-line="16" data-uid="ent0006" id="entity_optim"><rect fill="#F5EEFF" height="75.8633" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="145.6172" x="298.5" y="584.6211"/><text fill="#000000" font-family="Segoe UI" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="39.4912" x="308.5" y="609.7285">optim</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="125.6172" x="308.5" y="628.3496">host-side optimizers</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="51.2832" x="308.5" y="646.9707">(SGD, ...)</text></g><!--entity cpu--><g class="entity" data-entity="cpu" data-source-line="18" data-uid="ent0007" id="entity_cpu"><rect fill="#FFF0F0" height="57.2422" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="132.3555" x="474.5" y="497.6211"/><text fill="#000000" font-family="Segoe UI" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="85.0049" x="484.5" y="522.7285">backend-cpu</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="112.3555" x="484.5" y="541.3496">TypeScript kernels</text></g><!--entity wasm--><g class="entity" data-entity="wasm" data-source-line="19" data-uid="ent0008" id="entity_wasm"><rect fill="#FFF0F0" height="57.2422" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="163.9854" x="611.5" y="497.6211"/><text fill="#000000" font-family="Segoe UI" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="98.8135" x="621.5" y="522.7285">backend-wasm</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="143.9854" x="621.5" y="541.3496">Rust via wasm-bindgen</text></g><!--entity webgpu--><g class="entity" data-entity="webgpu" data-source-line="20" data-uid="ent0009" id="entity_webgpu"><rect fill="#FFF0F0" height="57.2422" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="166.6855" x="785" y="497.6211"/><text fill="#000000" font-family="Segoe UI" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="114.3721" x="795" y="522.7285">backend-webgpu</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="146.6855" x="795" y="541.3496">WGSL compute shaders</text></g><!--entity user--><g class="entity" data-entity="user" data-source-line="22" data-uid="ent0010" id="entity_user"><rect fill="#F5F5F5" height="75.8633" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="141.9668" x="407.5" y="721.6211"/><text fill="#000000" font-family="Segoe UI" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="63.1572" x="417.5" y="746.7285">user code</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="118.1523" x="417.5" y="765.3496">core + (nn / optim)</text><text fill="#000000" font-family="Segoe UI" font-size="14" lengthAdjust="spacing" textLength="121.9668" x="417.5" y="783.9707">+ a backend import</text></g><g class="entity" data-entity="GMN26" data-source-line="43" data-uid="ent0027" id="entity_GMN26"><path d="M203.5,323.6211 L203.5,389.6211 L168.08,393.6211 L203.5,397.6211 L203.5,463.9492 A4,4 0 0 0 207.5,467.9492 L399.3008,467.9492 A4,4 0 0 0 403.3008,463.9492 L403.3008,329.6211 L393.3008,319.6211 L207.5,319.6211 A4,4 0 0 0 203.5,323.6211" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M393.3008,319.6211 L393.3008,327.6211 A2,2 0 0 0 395.3008,329.6211 L403.3008,329.6211 L393.3008,319.6211" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacing" textLength="178.8008" x="209.5" y="338.6494">core is unaware of backends &#8212;</text><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacing" textLength="176.7759" x="209.5" y="355.9404">the user picks one and imports</text><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacing" textLength="152.0898" x="209.5" y="373.2314">for the side-effect register.</text><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacing" textLength="3.561" x="209.5" y="390.5225">&#160;</text><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacing" textLength="169.6982" x="209.5" y="407.8135">nn + optim sit on top of core,</text><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacing" textLength="163.9536" x="209.5" y="425.1045">mirroring jax.nn + optax and</text><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacing" textLength="144.3774" x="209.5" y="442.3955">tfjs-layers. Inference-only</text><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacing" textLength="138.3535" x="209.5" y="459.6865">users don't pull them in.</text></g><!--reverse link ir to runtime--><g class="link" data-entity-1="ir" data-entity-2="runtime" data-source-line="24" data-uid="lnk11" id="link_ir_runtime"><path d="M253.9813,105.8884 C299.3813,124.0384 353.75,145.7611 402.98,165.4411" fill="none" id="ir-backto-runtime" style="stroke:#555555;stroke-width:1;"/><polygon fill="#555555" points="248.41,103.6611,255.2821,110.7162,253.0527,105.5172,258.2518,103.2878,248.41,103.6611" style="stroke:#555555;stroke-width:1;"/></g><!--reverse link ir to core--><g class="link" data-entity-1="ir" data-entity-2="core" data-source-line="25" data-uid="lnk12" id="link_ir_core"><path d="M169.8247,109.4125 C154.0147,163.7825 120.33,279.6711 100.91,346.4911" fill="none" id="ir-backto-core" style="stroke:#555555;stroke-width:1;"/><polygon fill="#555555" points="171.5,103.6511,165.1461,111.1763,170.1039,108.4522,172.8279,113.41,171.5,103.6511" style="stroke:#555555;stroke-width:1;"/></g><!--reverse link runtime to core--><g class="link" data-entity-1="runtime" data-entity-2="core" data-source-line="26" data-uid="lnk13" id="link_runtime_core"><path d="M397.2839,232.4058 C334.5839,252.7858 255.94,281.8411 186.5,319.6211 C172.24,327.3811 157.73,336.9611 144.36,346.6111" fill="none" id="runtime-backto-core" style="stroke:#555555;stroke-width:1;"/><polygon fill="#555555" points="402.99,230.5511,393.1943,229.5291,398.2349,232.0967,395.6673,237.1373,402.99,230.5511" style="stroke:#555555;stroke-width:1;"/></g><!--reverse link runtime to cpu--><g class="link" data-entity-1="runtime