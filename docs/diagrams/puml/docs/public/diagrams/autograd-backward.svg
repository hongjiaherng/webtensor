ld" lengthAdjust="spacing" textLength="121.7197" x="166.9717" y="561.4775">[input.grad already set]</text><g class="message" data-participant-1="Loss" data-participant-2="Acc"><polygon fill="#181818" points="521.9414,586.1895,531.9414,590.1895,521.9414,594.1895,525.9414,590.1895" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="133.2427" x2="527.9414" y1="590.1895" y2="590.1895"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacing" textLength="178.166" x="140.2427" y="584.9268">input.grad = add(input.grad, g)</text></g><line style="stroke:#000000;stroke-width:1;stroke-dasharray:2.0,2.0;" x1="91.2231" x2="593.3105" y1="599.1895" y2="599.1895"/><text fill="#000000" font-family="Segoe UI" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="55.4297" x="96.2231" y="611.0596">[first time]</text><g class="message" data-participant-1="Loss" data-participant-2="Loss"><line style="stroke:#181818;stroke-width:1;" x1="133.2427" x2="175.2427" y1="638.1113" y2="638.1113"/><line style="stroke:#181818;stroke-width:1;" x1="175.2427" x2="175.2427" y1="638.1113" y2="651.1113"/><line style="stroke:#181818;stroke-width:1;" x1="134.2427" x2="175.2427" y1="651.1113" y2="651.1113"/><polygon fill="#181818" points="144.2427,647.1113,134.2427,651.1113,144.2427,655.1113,140.2427,651.1113" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacing" textLength="82.8433" x="140.2427" y="632.8486">input.grad = g</text></g><path d="M13,685.1113 L13,798.1113 L252,798.1113 L252,695.1113 L242,685.1113 L13,685.1113" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M242,685.1113 L242,695.1113 L252,695.1113 L242,685.1113" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacing" textLength="207.6509" x="19" y="704.1396">After backward(), `x.grad` is a Tensor</tex