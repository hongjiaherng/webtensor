71.2231,339.9883 L143.8735,339.9883 L143.8735,349.2793 L133.8735,359.2793 L71.2231,359.2793 L71.2231,339.9883" fill="#EEEEEE" style="stroke:#000000;stroke-width:1.5;"/><rect fill="none" height="333.123" style="stroke:#000000;stroke-width:1.5;" width="565.8687" x="71.2231" y="339.9883"/><text fill="#000000" font-family="Segoe UI" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="27.6504" x="86.2231" y="355.0166">loop</text><text fill="#000000" font-family="Segoe UI" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="139.0684" x="158.8735" y="353.8584">[reverse topo (i = N-1 .. 0)]</text><g class="message" data-participant-1="Loss" data-participant-2="Bwd"><polygon fill="#181818" points="408.541,424.7979,418.541,428.7979,408.541,432.7979,412.541,428.7979" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="133.2427" x2="414.541" y1="428.7979" y2="428.7979"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacing" textLength="128.2354" x="140.2427" y="423.5352">t._ctx.backward(t.grad)</text></g><path d="M425,364.2793 L425,477.2793 L621,477.2793 L621,374.2793 L611,364.2793 L425,364.2793" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M611,364.2793 L611,374.2793 L621,374.2793 L611,364.2793" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacing" textLength="129.0542" x="431" y="383.3076">Each backward returns</text><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacing" textLength="169.8062" x="431" y="400.5986">NEW Tensors that themselves</text><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacing" textLength="156.3428" x="431" y="417.8896">are graph nodes (Mul, Add,</text><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacing" textLength="175.5508" x="431" y="435.1807">MatMul, Transpose, ReluGr