name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'packages/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-flight runs.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Root workspace has the shared devDeps (@types/bun, typescript) and the
      # packages/* workspaces that TypeDoc reads via docs/typedoc.json. The
      # WASM backend's *.wasm import is ambient-declared in env.d.ts, so no
      # Rust/wasm-pack toolchain is needed for type-only doc generation.
      - name: Install root workspace
        run: bun install --frozen-lockfile

      - name: Install docs workspace
        run: bun install --frozen-lockfile
        working-directory: docs

      - name: Generate API reference
        run: bun scripts/gen-api-docs.ts
        working-directory: docs

      - name: Build (static export)
        run: bun run build
        working-directory: docs
        env:
          DEPLOY_BASE_PATH: /webtensor

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
